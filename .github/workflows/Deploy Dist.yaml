name: Deploy Dist
on: push
jobs:
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: Clone code
        uses: actions/checkout@v4
      - name: Install NodeJs
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      - name: print node version
        run: node --version
      - name: Cache dependencies
        uses: actions/cache@v4
        id: cacheDependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        if: steps.cacheDependencies.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run Lint
        run: npm run lint
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Clone code
        uses: actions/checkout@v4
      - name: Install NodeJs
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      - name: print node version
        run: node --version
      - name: Cache dependencies
        uses: actions/cache@v4
        id: cacheDependencies
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        if: steps.cacheDependencies.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build the node project
        run: npm run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dist folder
        run: echo "deploying dist folder"
    

